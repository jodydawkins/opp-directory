# fly.toml app configuration file generated for opp-directory on 2026-07-18T11:50:27-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'opp-directory'
primary_region = 'lax'

[build]
  dockerfile = 'Dockerfile'

[env]
  APP_ENV = "production"
  DATABASE_PATH = "/data/opp-directory.sqlite3"

[[mounts]]
  source = 'opp_directory_data'
  destination = '/data'

[http_service]
  internal_port = 9292
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
